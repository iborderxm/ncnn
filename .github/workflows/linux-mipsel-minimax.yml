name: linux-mipsel-minimax
on:
  workflow_dispatch:
    inputs:
      disable_rtti:
        description: 'Disable C++ RTTI'
        required: false
        default: 'ON'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      disable_exception:
        description: 'Disable C++ exceptions'
        required: false
        default: 'ON'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      vulkan:
        description: 'Enable Vulkan support'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      stdio:
        description: 'Enable NCNN_STDIO'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      string:
        description: 'Enable NCNN_STRING'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      bf16:
        description: 'Enable NCNN_BF16'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      int8:
        description: 'Enable NCNN_INT8'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      pixel_drawing:
        description: 'Enable pixel drawing functions'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      pixel_rotate:
        description: 'Enable pixel rotate functions'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      pixel_affine:
        description: 'Enable pixel affine functions'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      pixel:
        description: 'Enable pixel functions'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      openmp:
        description: 'Enable OpenMP'
        required: false
        default: 'OFF'
        type: choice
        options:
          - 'ON'
          - 'OFF'
      simplestl:
        description: 'Use simpleSTL instead of compiler STL'
        required: false
        default: 'ON'
        type: choice
        options:
          - 'ON'
          - 'OFF'
  push:
    branches: [master]
    paths:
    - '.github/workflows/linux-mipsel-minimax.yml'
    - 'toolchains/mipsel-linux-gnu.toolchain.cmake'
    - 'CMakeLists.txt'
    - 'cmake/**'
    - 'src/*'
    - 'src/layer/*'
    - 'src/layer/mips/**'
    - 'tests/**'
  pull_request:
    branches: [master]
    paths:
    - '.github/workflows/linux-mipsel-minimax.yml'
    - 'toolchains/mipsel-linux-gnu.toolchain.cmake'
    - 'CMakeLists.txt'
    - 'cmake/**'
    - 'src/*'
    - 'src/layer/*'
    - 'src/layer/mips/**'
    - 'tests/**'
concurrency:
  group: linux-mipsel-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  mipsel:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: mipsel-gnu-toolchain
      run: |
        sudo apt-get update
        sudo apt-get install g++-mipsel-linux-gnu qemu-user-static
        
    - name: Install MIPS cross-compiler
      run: |
        mkdir temp
        cd temp
        wget --progress=dot https://github.com/themactep/thingino-firmware/releases/download/toolchain-x86_64/thingino-toolchain-x86_64_xburst1_4_4_musl_gcc14-linux-mipsel.tar.gz 
        tar -xzf thingino-toolchain-x86_64_xburst1_4_4_musl_gcc14-linux-mipsel.tar.gz
        mv mipsel-thingino-linux-musl_sdk-buildroot /tmp/
        ls -ltr /tmp/mipsel-thingino-linux-musl_sdk-buildroot/
        ls -ltr /tmp/mipsel-thingino-linux-musl_sdk-buildroot/bin/
        /tmp/mipsel-thingino-linux-musl_sdk-buildroot/relocate-sdk.sh
        echo "/tmp/mipsel-thingino-linux-musl_sdk-buildroot/bin" >> $GITHUB_PATH
        echo "TOOLCHAIN_DIR=/tmp/mipsel-thingino-linux-musl_sdk-buildroot" >> $GITHUB_ENV
        echo "PATH=${TOOLCHAIN_DIR}/bin:$PATH" >> $GITHUB_ENV
        cd ../
        rm -rf temp

    - name: Configure CMake
      run: |
        cd $GITHUB_WORKSPACE
        # update ../toolchains/mipsel-linux-gnu.toolchain.cmake
        sed -i 's/mipsel-linux-gnu-gcc/mipsel-thingino-linux-musl-gcc/' ./toolchains/mipsel-linux-gnu.toolchain.cmake
        sed -i 's/mipsel-linux-gnu-g++/mipsel-thingino-linux-musl-g++/' ./toolchains/mipsel-linux-gnu.toolchain.cmake
        cat ./toolchains/mipsel-linux-gnu.toolchain.cmake

    - name: build
      run: |
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=../toolchains/mipsel-linux-gnu.toolchain.cmake \
          -DNCNN_BUILD_TOOLS=OFF \
          -DNCNN_BUILD_EXAMPLES=OFF \
          -DNCNN_BUILD_TESTS=ON \
          -DNCNN_DISABLE_RTTI=${{ inputs.disable_rtti || 'ON' }} \
          -DNCNN_DISABLE_EXCEPTION=${{ inputs.disable_exception || 'ON' }} \
          -DNCNN_VULKAN=${{ inputs.vulkan || 'OFF' }} \
          -DNCNN_STDIO=${{ inputs.stdio || 'OFF' }} \
          -DNCNN_STRING=${{ inputs.string || 'OFF' }} \
          -DNCNN_BF16=${{ inputs.bf16 || 'OFF' }} \
          -DNCNN_INT8=${{ inputs.int8 || 'OFF' }} \
          -DNCNN_PIXEL_DRAWING=${{ inputs.pixel_drawing || 'OFF' }} \
          -DNCNN_PIXEL_ROTATE=${{ inputs.pixel_rotate || 'OFF' }} \
          -DNCNN_PIXEL_AFFINE=${{ inputs.pixel_affine || 'OFF' }} \
          -DNCNN_PIXEL=${{ inputs.pixel || 'OFF' }} \
          -DNCNN_OPENMP=${{ inputs.openmp || 'OFF' }} \
          -DNCNN_SIMPLESTL=${{ inputs.simplestl || 'ON' }} \
          ..
        cmake --build . -j $(nproc)
        make install

    - name:  test and strip binaries
      run: |
        cd build
        # TESTS_EXECUTABLE_LOADER=qemu-mipsel-static TESTS_EXECUTABLE_LOADER_ARGUMENTS="-L;/usr/mipsel-linux-gnu" ctest --output-on-failure -j $(nproc)
        
        UPDATE_FW_DATETIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d-%H-%M')
        echo "UPDATE_FW_DATETIME=${UPDATE_FW_DATETIME}" >> ${GITHUB_ENV}
        cd $GITHUB_WORKSPACE

    - name:  Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ncnn-mipsel-${{ env.UPDATE_FW_DATETIME }}
        path: build/
        retention-days: 7